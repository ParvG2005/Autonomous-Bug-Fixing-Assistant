# Local development stack. Phases wire services in as they land:
#   Phase 1 needs none of this (the repo brain is a local CLI).
#   Phase 6+ uses postgres; Phase 7+ uses redis; Phase 10+ uses langfuse.
# Secrets come from a local .env (never committed). See .env.example.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: bugfix
      POSTGRES_PASSWORD: bugfix
      POSTGRES_DB: bugfix
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bugfix"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
